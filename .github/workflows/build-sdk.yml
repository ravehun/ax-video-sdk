name: Build SDK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - chip: ax650
            script: ./build_ax650.sh
            msp_zip: msp_50_3.10.2.zip
            msp_url: https://github.com/ZHEQIUSHUI/assets/releases/download/ax_3.6.2/msp_50_3.10.2.zip
            toolchain_pkg: unzip xz-utils
            toolchain_url: https://developer.arm.com/-/media/Files/downloads/gnu-a/9.2-2019.12/binrel/gcc-arm-9.2-2019.12-x86_64-aarch64-none-linux-gnu.tar.xz
            toolchain_archive: gcc-arm-9.2-2019.12-x86_64-aarch64-none-linux-gnu.tar.xz
            toolchain_dir: ${{ github.workspace }}/.ci/toolchains/gcc-arm-9.2-2019.12-x86_64-aarch64-none-linux-gnu/bin
          - chip: ax630c
            script: ./build_ax630c.sh
            msp_zip: msp_20e_3.0.0.zip
            msp_url: https://github.com/ZHEQIUSHUI/assets/releases/download/ax_3.6.2/msp_20e_3.0.0.zip
            toolchain_pkg: unzip xz-utils
            toolchain_url: https://developer.arm.com/-/media/Files/downloads/gnu-a/9.2-2019.12/binrel/gcc-arm-9.2-2019.12-x86_64-aarch64-none-linux-gnu.tar.xz
            toolchain_archive: gcc-arm-9.2-2019.12-x86_64-aarch64-none-linux-gnu.tar.xz
            toolchain_dir: ${{ github.workspace }}/.ci/toolchains/gcc-arm-9.2-2019.12-x86_64-aarch64-none-linux-gnu/bin
          - chip: ax620qp
            script: ./build_ax620qp.sh
            msp_zip: msp_20e_3.0.0.zip
            msp_url: https://github.com/ZHEQIUSHUI/assets/releases/download/ax_3.6.2/msp_20e_3.0.0.zip
            toolchain_pkg: unzip xz-utils
            toolchain_url: https://releases.linaro.org/components/toolchain/binaries/7.5-2019.12/arm-linux-gnueabihf/gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf.tar.xz
            toolchain_archive: gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf.tar.xz
            toolchain_dir: ${{ github.workspace }}/.ci/toolchains/gcc-linaro-7.5.0-2019.12-x86_64_arm-linux-gnueabihf/bin
          - chip: ax620q
            script: ./build_ax620q.sh
            msp_zip: msp_20e_3.0.0.zip
            msp_url: https://github.com/ZHEQIUSHUI/assets/releases/download/ax_3.6.2/msp_20e_3.0.0.zip
            toolchain_pkg: unzip
            toolchain_url: https://github.com/AXERA-TECH/ax620q_bsp_sdk/releases/download/v2.0.0/arm-AX620E-linux-uclibcgnueabihf_V3_20240320.tgz
            toolchain_archive: arm-AX620E-linux-uclibcgnueabihf_V3_20240320.tgz
            toolchain_dir: ${{ github.workspace }}/.ci/toolchains/arm-AX620E-linux-uclibcgnueabihf/bin

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache CI Assets
        uses: actions/cache@v4
        with:
          path: |
            .ci/downloads
            .ci/toolchains
            .ci/msp
          key: ${{ runner.os }}-${{ matrix.chip }}-${{ hashFiles('.github/workflows/build-sdk.yml', 'scripts/build_common.sh', 'toolchains/*.cmake') }}

      - name: Install Toolchains
        if: matrix.toolchain_pkg != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.toolchain_pkg }}

      - name: Download MSP
        env:
          MSP_URL: ${{ matrix.msp_url }}
          MSP_ZIP: ${{ matrix.msp_zip }}
        run: |
          mkdir -p "${{ github.workspace }}/.ci/downloads"
          if [ ! -f "${{ github.workspace }}/.ci/downloads/$MSP_ZIP" ]; then
            curl -L "$MSP_URL" -o "${{ github.workspace }}/.ci/downloads/$MSP_ZIP"
          fi

      - name: Download Toolchain
        if: matrix.toolchain_url != ''
        env:
          TOOLCHAIN_URL: ${{ matrix.toolchain_url }}
          TOOLCHAIN_ARCHIVE: ${{ matrix.toolchain_archive }}
        run: |
          mkdir -p "${{ github.workspace }}/.ci/toolchains"
          if [ ! -f "${{ github.workspace }}/.ci/toolchains/$TOOLCHAIN_ARCHIVE" ]; then
            curl -L "$TOOLCHAIN_URL" -o "${{ github.workspace }}/.ci/toolchains/$TOOLCHAIN_ARCHIVE"
          fi
          if [ ! -d "${{ matrix.toolchain_dir }}" ]; then
            case "$TOOLCHAIN_ARCHIVE" in
              *.tar.xz|*.tgz|*.tar.gz)
                tar -xf "${{ github.workspace }}/.ci/toolchains/$TOOLCHAIN_ARCHIVE" -C "${{ github.workspace }}/.ci/toolchains"
                ;;
              *)
                echo "unsupported toolchain archive: $TOOLCHAIN_ARCHIVE" >&2
                exit 1
                ;;
            esac
          fi

      - name: Build
        env:
          AXSDK_MSP_ZIP_PATH: ${{ github.workspace }}/.ci/downloads/${{ matrix.msp_zip }}
          AXSDK_TOOLCHAIN_BIN: ${{ matrix.toolchain_dir }}
        run: |
          chmod +x ./build_ax650.sh ./build_ax630c.sh ./build_ax620q.sh ./build_ax620qp.sh ./scripts/build_common.sh
          ${{ matrix.script }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ax_video_sdk_${{ matrix.chip }}
          path: artifacts/${{ matrix.chip }}/ax_video_sdk_${{ matrix.chip }}.tar.gz
